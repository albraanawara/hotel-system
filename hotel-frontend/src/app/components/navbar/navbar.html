<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3 shadow-sm">

  <!-- Brand -->
  <a class="navbar-brand fw-bold" routerLink="/home">

  </a>

  <!-- Toggle (mobile) -->
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
    <span class="navbar-toggler-icon"></span>
  </button>

  <!-- Links -->
  <div class="collapse navbar-collapse" id="nav">

    <ul class="navbar-nav ms-auto align-items-lg-center gap-2">

      <li class="nav-item">
        <a routerLink="/home"
           routerLinkActive="active-link"
           [routerLinkActiveOptions]="{ exact: true }"

          Home
        </a>
      </li>

      <li class="nav-item">
        <a routerLink="/rooms"
           routerLinkActive="active-link"
           class="nav-link">
          Rooms
        </a>
      </li>

      <li class="nav-item">
        <a routerLink="/bookings"
           routerLinkActive="active-link"
           class="nav-link">
          My Bookings
        </a>
      </li>

      <li class="nav-item" *ngIf="isAdmin()">
        <a routerLink="/admin"
           routerLinkActive="active-link"
           class="nav-link text-warning fw-bold">
          Admin Panel
        </a>
      </li>

      <!-- 🔐 Auth -->
      <li class="nav-item" *ngIf="!isLoggedIn()">
        <a routerLink="/login" class="btn btn-outline-light btn-sm me-2">
          Login
        </a>

        <a routerLink="/register" class="btn btn-warning btn-sm">
